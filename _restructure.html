<style>
/* 기본 TOC 사이드바 숨기기 */
#quarto-margin-sidebar {
  display: none !important;
}

/* TOC 토글 버튼 */
#toc-toggle-btn {
  position: fixed;
  right: 1.2rem;
  top: 5rem;
  z-index: 1000;
  background: #1B263B;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  transition: background 0.2s;
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  writing-mode: horizontal-tb;
}
#toc-toggle-btn:hover {
  background: #2563EB;
}

/* TOC 플로팅 패널 */
#toc-floating-panel {
  position: fixed;
  right: -320px;
  top: 60px;
  width: 280px;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(8px);
  border: 1px solid #e2e8f0;
  border-radius: 12px 0 0 12px;
  box-shadow: -4px 0 24px rgba(0,0,0,0.1);
  z-index: 999;
  transition: right 0.3s ease;
  padding: 1.2rem 1rem;
}
#toc-floating-panel.open {
  right: 0;
}
#toc-floating-panel .toc-title {
  font-size: 0.8rem;
  font-weight: 700;
  color: #94a3b8;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}
#toc-floating-panel nav a {
  display: block;
  font-size: 0.88rem;
  color: #475569;
  text-decoration: none;
  padding: 0.25rem 0;
  line-height: 1.5;
  transition: color 0.15s;
  border-left: 2px solid transparent;
  padding-left: 0.6rem;
}
#toc-floating-panel nav a:hover {
  color: #2563EB;
  border-left-color: #2563EB;
}
#toc-floating-panel nav ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
#toc-floating-panel nav ul ul a {
  padding-left: 1.4rem;
  font-size: 0.83rem;
  color: #64748b;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // 포스트 페이지에서만 TOC 버튼 표시
  if (window.location.pathname.includes('/posts/')) {
    var headings = document.querySelectorAll('#quarto-document-content h2, #quarto-document-content h3');
    if (headings.length > 0) {
      // 헤딩으로 TOC 직접 생성
      var nav = document.createElement('nav');
      var ul = document.createElement('ul');
      headings.forEach(function(h) {
        var anchorId = h.id || h.getAttribute('data-anchor-id');
        if (!anchorId) return;
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + anchorId;
        a.textContent = h.textContent;
        if (h.tagName === 'H3') li.style.paddingLeft = '0.8rem';
        li.appendChild(a);
        ul.appendChild(li);
      });
      nav.appendChild(ul);

      // 플로팅 패널 생성
      var panel = document.createElement('div');
      panel.id = 'toc-floating-panel';
      panel.innerHTML = '<div class="toc-title">Table of Contents</div>';
      panel.appendChild(nav);
      document.body.appendChild(panel);

      // 토글 버튼 생성
      var btn = document.createElement('button');
      btn.id = 'toc-toggle-btn';
      btn.textContent = '목차';
      document.body.appendChild(btn);

      var open = false;
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        open = true;
        panel.classList.add('open');
        btn.style.display = 'none';
      });

      // 패널 바깥 클릭 시 닫기
      document.addEventListener('click', function (e) {
        if (open && !panel.contains(e.target)) {
          open = false;
          panel.classList.remove('open');
          btn.style.display = '';
        }
      });
    }
  }

  // 네비바 RhoGAM Boy → Rho[GAM] Boy 색상 처리
  var navTitle = document.querySelector('.navbar-title');
  if (navTitle) {
    navTitle.innerHTML = '<span style="color:#2563EB">GAM</span><span style="color:#1B263B">Rho</span>';
  }

  // 포스트 헤더: 카테고리를 날짜 옆으로 이동
  var titleBlock = document.getElementById('title-block-header');
  if (titleBlock) {
    var cats = titleBlock.querySelector('.quarto-title .quarto-categories');
    var metaInner = titleBlock.querySelector('.quarto-title-meta > div');
    if (cats && metaInner) {
      metaInner.appendChild(cats);
    }
  }

  // 관련 글 표시 (포스트 페이지에서만)
  var content = document.getElementById('quarto-document-content');
  if (!content || !window.location.pathname.includes('/posts/')) return;

  var currentUrl = decodeURIComponent(window.location.pathname);

  fetch('/posts-data.json')
    .then(r => r.json())
    .then(posts => {
      var currentPost = posts.find(p => p.url === currentUrl);
      if (!currentPost || currentPost.categories.length === 0) return;

      var related = posts.filter(p => {
        if (p.url === currentUrl) return false;
        return p.categories.some(c => currentPost.categories.includes(c));
      }).slice(0, 3);

      if (related.length === 0) return;

      var section = document.createElement('div');
      section.style.cssText = 'margin-top: 3rem; border-top: 1px solid #e2e8f0; padding-top: 2rem;';
      section.innerHTML = '<h3 style="margin-bottom: 1.2rem; font-size: 1.1rem; color: #475569;">관련 글</h3>';

      var grid = document.createElement('div');
      grid.style.cssText = 'display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem;';

      related.forEach(p => {
        var card = document.createElement('a');
        card.href = encodeURI(p.url);
        card.style.cssText = 'display: block; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; transition: box-shadow 0.2s, transform 0.2s;';

        var imgEl = document.createElement('div');
        if (p.image) {
          imgEl.innerHTML = `<img src="${p.image}" style="width:100%; height:130px; object-fit:cover;" alt="">`;
        } else {
          imgEl.style.cssText = 'width:100%; height:130px; background:#f1f5f9;';
        }

        var bodyEl = document.createElement('div');
        bodyEl.style.cssText = 'padding: 0.8rem;';

        var catEl = document.createElement('div');
        catEl.style.cssText = 'font-size: 0.85rem; color: #64748b; margin-bottom: 0.3rem;';
        catEl.textContent = p.categories[0] || '';

        var titleEl = document.createElement('div');
        titleEl.style.cssText = 'font-size: 0.95rem; font-weight: 600; line-height: 1.4; color: #1B263B; transition: color 0.15s;';
        titleEl.textContent = p.title;

        bodyEl.appendChild(catEl);
        bodyEl.appendChild(titleEl);
        card.appendChild(imgEl);
        card.appendChild(bodyEl);

        card.addEventListener('mouseover', () => {
          card.style.boxShadow = '0 4px 16px rgba(37,99,235,0.15)';
          card.style.transform = 'translateY(-2px)';
          titleEl.style.color = '#2563EB';
        });
        card.addEventListener('mouseout', () => {
          card.style.boxShadow = '';
          card.style.transform = '';
          titleEl.style.color = '#1B263B';
        });

        grid.appendChild(card);
      });

      section.appendChild(grid);
      content.appendChild(section);
    })
    .catch(() => {});

  // 댓글 기능
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwATSPU8uHEUQV_oMmzwI3WWUoLa_s8hL7Z9c0AjRfeFUfrcMd2may7BqJuRuGnPLmhQA/exec';
  var pageId = decodeURIComponent(window.location.pathname);

  var commentSection = document.createElement('div');
  commentSection.style.cssText = 'margin-top: 3rem; border-top: 1px solid #e2e8f0; padding-top: 2rem;';
  commentSection.innerHTML = `
    <h3 style="font-size:1.1rem; color:#475569; margin-bottom:1.2rem;">댓글</h3>
    <div id="comment-list" style="margin-bottom:1.5rem;"></div>
    <div style="display:flex; flex-direction:column; gap:0.6rem;">
      <div style="display:flex; gap:0.5rem; align-items:center;">
        <input id="comment-name" placeholder="이름" style="width:140px; padding:0.5rem 0.8rem; border:1px solid #e2e8f0; border-radius:6px; font-size:0.95rem; outline:none;"/>
        <button id="comment-submit" style="background:#1B263B; color:white; border:none; border-radius:6px; padding:0.5rem 1.2rem; font-size:0.9rem; cursor:pointer; transition:background 0.2s;">등록</button>
      </div>
      <textarea id="comment-body" placeholder="댓글을 입력하세요..." rows="3" style="padding:0.5rem 0.8rem; border:1px solid #e2e8f0; border-radius:6px; font-size:0.95rem; resize:vertical; outline:none; font-family:inherit;"></textarea>
    </div>
  `;
  content.appendChild(commentSection);

  document.getElementById('comment-submit').onmouseover = function(){ this.style.background='#2563EB'; };
  document.getElementById('comment-submit').onmouseout = function(){ this.style.background='#1B263B'; };

  var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjFRYWdfjJXKh7GBv8WwxbhoS1OufqduAVnl7wrC__Sfi6kzay9gq7zdbqurZYSaLNds7-2d4yad0v/pub?gid=0&single=true&output=csv';

  function parseCSV(line) {
    var result = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur);
    return result;
  }

  function loadComments() {
    fetch(CSV_URL)
      .then(r => r.text())
      .then(csv => {
        var lines = csv.trim().split('\n');
        var comments = [];
        for (var i = 1; i < lines.length; i++) {
          var cols = parseCSV(lines[i]);
          if (cols[1] === pageId) {
            comments.push({ timestamp: cols[0], name: cols[2], comment: cols[3] });
          }
        }
        var list = document.getElementById('comment-list');
        if (!list) return;
        if (!comments.length) { list.innerHTML = '<p style="color:#94a3b8; font-size:0.9rem;">아직 댓글이 없습니다.</p>'; return; }
        list.innerHTML = comments.reverse().map(c => `
          <div style="padding:0.9rem 0; border-bottom:1px solid #f1f5f9;">
            <div style="display:flex; align-items:center; gap:0.6rem; margin-bottom:0.3rem;">
              <span style="font-weight:600; font-size:0.9rem; color:#1B263B;">${c.name}</span>
              <span style="font-size:0.8rem; color:#94a3b8;">${new Date(c.timestamp).toLocaleDateString('ko-KR')}</span>
            </div>
            <p style="margin:0; font-size:0.95rem; color:#475569; line-height:1.6;">${c.comment}</p>
          </div>
        `).join('');
      }).catch(() => {});
  }

  loadComments();

  document.getElementById('comment-submit').addEventListener('click', function() {
    var name = document.getElementById('comment-name').value.trim();
    var comment = document.getElementById('comment-body').value.trim();
    if (!name || !comment) { alert('이름과 댓글을 입력해주세요.'); return; }
    var btn = this;
    btn.disabled = true; btn.textContent = '등록 중...';
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: new URLSearchParams({ page: pageId, name: name, comment: comment }),
    }).then(() => {
      var list = document.getElementById('comment-list');
      var noMsg = list.querySelector('p');
      if (noMsg) noMsg.remove();
      var newItem = document.createElement('div');
      newItem.style.cssText = 'padding:0.9rem 0; border-bottom:1px solid #f1f5f9;';
      newItem.innerHTML = `
        <div style="display:flex; align-items:center; gap:0.6rem; margin-bottom:0.3rem;">
          <span style="font-weight:600; font-size:0.9rem; color:#1B263B;">${name}</span>
          <span style="font-size:0.8rem; color:#94a3b8;">${new Date().toLocaleDateString('ko-KR')}</span>
        </div>
        <p style="margin:0; font-size:0.95rem; color:#475569; line-height:1.6;">${comment}</p>
      `;
      list.insertBefore(newItem, list.firstChild);
      document.getElementById('comment-name').value = '';
      document.getElementById('comment-body').value = '';
      btn.disabled = false; btn.textContent = '등록';
    }).catch(() => { btn.disabled = false; btn.textContent = '등록'; });
  });
});
</script>
