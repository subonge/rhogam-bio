<style>
/* Waline 레이아웃 커스텀 */
#waline .wl-comment {
  display: flex;
  flex-direction: column;
}
#waline .wl-panel { order: 1; }
#waline .wl-meta-head { order: 2; }
#waline .wl-cards { order: 3; }

/* 새로고침 버튼, 정렬 옵션 숨기기 */
#waline .wl-refresh,
#waline .wl-sort {
  display: none !important;
}

/* 기본 TOC 사이드바 숨기기 */
#quarto-margin-sidebar {
  display: none !important;
}

/* TOC 토글 버튼 */
#toc-toggle-btn {
  position: fixed;
  right: 1.2rem;
  top: 5rem;
  z-index: 1000;
  background: #1B263B;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  transition: background 0.2s;
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  writing-mode: horizontal-tb;
}
#toc-toggle-btn:hover {
  background: #2563EB;
}

/* TOC 플로팅 패널 */
#toc-floating-panel {
  position: fixed;
  right: -320px;
  top: 60px;
  width: 280px;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(8px);
  border: 1px solid #e2e8f0;
  border-radius: 12px 0 0 12px;
  box-shadow: -4px 0 24px rgba(0,0,0,0.1);
  z-index: 999;
  transition: right 0.3s ease;
  padding: 1.2rem 1rem;
}
#toc-floating-panel.open {
  right: 0;
}
#toc-floating-panel .toc-title {
  font-size: 0.8rem;
  font-weight: 700;
  color: #94a3b8;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}
#toc-floating-panel nav a {
  display: block;
  font-size: 0.88rem;
  color: #475569;
  text-decoration: none;
  padding: 0.25rem 0;
  line-height: 1.5;
  transition: color 0.15s;
  border-left: 2px solid transparent;
  padding-left: 0.6rem;
}
#toc-floating-panel nav a:hover {
  color: #2563EB;
  border-left-color: #2563EB;
}
#toc-floating-panel nav ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
#toc-floating-panel nav ul ul a {
  padding-left: 1.4rem;
  font-size: 0.83rem;
  color: #64748b;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // 포스트 페이지에서만 TOC 버튼 표시
  if (window.location.pathname.includes('/posts/')) {
    var toc = document.querySelector('nav#TOC');
    if (toc) {
      // 플로팅 패널 생성
      var panel = document.createElement('div');
      panel.id = 'toc-floating-panel';
      panel.innerHTML = '<div class="toc-title">목차</div>';
      var navClone = toc.cloneNode(true);
      panel.appendChild(navClone);
      document.body.appendChild(panel);

      // 토글 버튼 생성
      var btn = document.createElement('button');
      btn.id = 'toc-toggle-btn';
      btn.textContent = '목차';
      document.body.appendChild(btn);

      var open = false;
      btn.addEventListener('click', function () {
        open = !open;
        panel.classList.toggle('open', open);
        btn.style.background = open ? '#2563EB' : '#1B263B';
      });

      // 패널 바깥 클릭 시 닫기
      document.addEventListener('click', function (e) {
        if (open && !panel.contains(e.target) && e.target !== btn) {
          open = false;
          panel.classList.remove('open');
          btn.style.background = '#1B263B';
        }
      });
    }
  }

  // 네비바 RhoGAM Boy → Rho[GAM] Boy 색상 처리
  var navTitle = document.querySelector('.navbar-title');
  if (navTitle) {
    navTitle.innerHTML = '<span style="color:#1B263B">Rho</span><span style="color:#2563EB">GAM</span><span style="color:#1B263B"> Boy</span>';
  }

  // 포스트 헤더: 카테고리를 날짜 옆으로 이동
  var titleBlock = document.getElementById('title-block-header');
  if (titleBlock) {
    var cats = titleBlock.querySelector('.quarto-title .quarto-categories');
    var metaInner = titleBlock.querySelector('.quarto-title-meta > div');
    if (cats && metaInner) {
      metaInner.appendChild(cats);
    }
  }

  // 관련 글 표시 (포스트 페이지에서만)
  var content = document.getElementById('quarto-document-content');
  if (!content || !window.location.pathname.includes('/posts/')) return;

  var currentUrl = decodeURIComponent(window.location.pathname);

  fetch('/posts-data.json')
    .then(r => r.json())
    .then(posts => {
      var currentPost = posts.find(p => p.url === currentUrl);
      if (!currentPost || currentPost.categories.length === 0) return;

      var related = posts.filter(p => {
        if (p.url === currentUrl) return false;
        return p.categories.some(c => currentPost.categories.includes(c));
      }).slice(0, 3);

      if (related.length === 0) return;

      var section = document.createElement('div');
      section.style.cssText = 'margin-top: 3rem; border-top: 1px solid #e2e8f0; padding-top: 2rem;';
      section.innerHTML = '<h3 style="margin-bottom: 1.2rem; font-size: 1.1rem; color: #475569;">관련 글</h3>';

      var grid = document.createElement('div');
      grid.style.cssText = 'display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem;';

      related.forEach(p => {
        var card = document.createElement('a');
        card.href = encodeURI(p.url);
        card.style.cssText = 'display: block; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; transition: box-shadow 0.2s, transform 0.2s;';

        var imgEl = document.createElement('div');
        if (p.image) {
          imgEl.innerHTML = `<img src="${p.image}" style="width:100%; height:130px; object-fit:cover;" alt="">`;
        } else {
          imgEl.style.cssText = 'width:100%; height:130px; background:#f1f5f9;';
        }

        var bodyEl = document.createElement('div');
        bodyEl.style.cssText = 'padding: 0.8rem;';

        var catEl = document.createElement('div');
        catEl.style.cssText = 'font-size: 0.85rem; color: #64748b; margin-bottom: 0.3rem;';
        catEl.textContent = p.categories[0] || '';

        var titleEl = document.createElement('div');
        titleEl.style.cssText = 'font-size: 0.95rem; font-weight: 600; line-height: 1.4; color: #1B263B; transition: color 0.15s;';
        titleEl.textContent = p.title;

        bodyEl.appendChild(catEl);
        bodyEl.appendChild(titleEl);
        card.appendChild(imgEl);
        card.appendChild(bodyEl);

        card.addEventListener('mouseover', () => {
          card.style.boxShadow = '0 4px 16px rgba(37,99,235,0.15)';
          card.style.transform = 'translateY(-2px)';
          titleEl.style.color = '#2563EB';
        });
        card.addEventListener('mouseout', () => {
          card.style.boxShadow = '';
          card.style.transform = '';
          titleEl.style.color = '#1B263B';
        });

        grid.appendChild(card);
      });

      section.appendChild(grid);
      content.appendChild(section);
    })
    .catch(() => {});
});
</script>

<link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css" />
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (!window.location.pathname.includes('/posts/')) return;

  var container = document.createElement('div');
  container.id = 'waline';
  container.style.cssText = 'margin-top: 3rem; border-top: 1px solid #e2e8f0; padding-top: 2rem;';

  var content = document.getElementById('quarto-document-content');
  if (content) content.appendChild(container);

  import('https://unpkg.com/@waline/client@v3/dist/waline.js').then(({ init }) => {
    init({
      el: '#waline',
      serverURL: 'https://waline-delta-umber-39.vercel.app',
      lang: 'ko',
      meta: ['nick', 'mail'],
      requiredMeta: ['nick'],
      wordLimit: 0,
      pageSize: 10,
    });
  });
});
</script>
